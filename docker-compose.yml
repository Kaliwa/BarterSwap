services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: barterswap
      POSTGRES_PASSWORD: barterswap
      POSTGRES_DB: barterswap
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U barterswap -d barterswap"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://barterswap:barterswap@db:5432/barterswap?sslmode=disable
      PORT: "8080"
    ports:
      - "8080:8080"

volumes:
  pgdata:
